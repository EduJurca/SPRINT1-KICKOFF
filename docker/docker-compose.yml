version: '3.8'

services:
  # Web Server Service (PHP 8.2 + Apache)
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: carsharing-web
    ports:
      - "80:80"
    volumes:
      - ../web:/var/www/html
      - logs:/var/log/apache2
    environment:
      - DB_HOST=${DB_HOST:-mariadb}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-carsharing}
      - DB_USER=${DB_USER:-carsharing_user}
      - DB_PASSWORD=${DB_PASSWORD:-carsharing_pass}
      - MONGO_HOST=${MONGO_HOST:-mongodb}
      - MONGO_PORT=${MONGO_PORT:-27017}
      - MONGO_DB=${MONGO_DB:-carsharing}
      - MONGO_USER=${MONGO_USER:-carsharing_user}
      - MONGO_PASSWORD=${MONGO_PASSWORD:-carsharing_pass}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - APP_ENV=${APP_ENV:-production}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      mariadb:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - carsharing-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MariaDB Database Service
  mariadb:
    image: mariadb:11.4
    container_name: carsharing-mariadb
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_password_change_me}
      - MYSQL_DATABASE=${DB_NAME:-carsharing}
      - MYSQL_USER=${DB_USER:-carsharing_user}
      - MYSQL_PASSWORD=${DB_PASSWORD:-carsharing_pass}
    volumes:
      - mariadb-data:/var/lib/mysql
      - ../database/mariadb:/docker-entrypoint-initdb.d:ro
    networks:
      - carsharing-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # MongoDB Database Service
  mongodb:
    image: mongo:7.0
    container_name: carsharing-mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-admin_password_change_me}
      - MONGO_INITDB_DATABASE=${MONGO_DB:-carsharing}
      - MONGO_USER=${MONGO_USER:-carsharing_user}
      - MONGO_PASSWORD=${MONGO_PASSWORD:-carsharing_pass}
    volumes:
      - mongodb-data:/data/db
      - ../database/mongodb:/docker-entrypoint-initdb.d:ro
    networks:
      - carsharing-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

# Networks
networks:
  carsharing-network:
    driver: bridge
    name: carsharing-network

# Volumes
volumes:
  mariadb-data:
    name: carsharing-mariadb-data
    driver: local
  mongodb-data:
    name: carsharing-mongodb-data
    driver: local
  logs:
    name: carsharing-logs
    driver: local
