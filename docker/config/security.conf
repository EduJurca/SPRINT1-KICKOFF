# Apache Security Configuration
# Carsharing Platform - Security Hardening
# Date: October 2025
# Based on OWASP recommendations and 2025 best practices

# Disable directory listing
<Directory /var/www/html>
    Options -Indexes
</Directory>

# Prevent access to .ht files (e.g., .htaccess, .htpasswd)
<FilesMatch "^\.ht">
    Require all denied
</FilesMatch>

# Prevent access to version control files
<DirectoryMatch "/\.git">
    Require all denied
</DirectoryMatch>

<DirectoryMatch "/\.svn">
    Require all denied
</DirectoryMatch>

# Prevent access to environment files
<FilesMatch "^\.env">
    Require all denied
</FilesMatch>

# Prevent access to composer files
<FilesMatch "^composer\.(json|lock)$">
    Require all denied
</FilesMatch>

# Prevent access to package manager files
<FilesMatch "^(package\.json|package-lock\.json|yarn\.lock)$">
    Require all denied
</FilesMatch>

# Prevent access to configuration files
<FilesMatch "\.(ini|conf|config)$">
    Require all denied
</FilesMatch>

# Prevent access to backup files
<FilesMatch "\.(bak|backup|old|save|swp|tmp)$">
    Require all denied
</FilesMatch>

# Security Headers
<IfModule mod_headers.c>
    # X-Frame-Options: Prevent clickjacking attacks
    # SAMEORIGIN allows framing only from same origin
    Header always set X-Frame-Options "SAMEORIGIN"
    
    # X-Content-Type-Options: Prevent MIME type sniffing
    Header always set X-Content-Type-Options "nosniff"
    
    # X-XSS-Protection: Enable browser's XSS protection
    # 1; mode=block enables XSS filter and blocks page rendering if attack detected
    Header always set X-XSS-Protection "1; mode=block"
    
    # Referrer-Policy: Control information sent in Referer header
    # strict-origin-when-cross-origin sends full URL for same-origin, origin only for cross-origin
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    
    # Content Security Policy (CSP)
    # Mitigate XSS and content injection attacks
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdn.jsdelivr.net https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://unpkg.com https://cdn.jsdelivr.net https://cdn.tailwindcss.com; img-src 'self' data: https: blob:; font-src 'self' data: https://unpkg.com https://cdn.jsdelivr.net https://cdn.tailwindcss.com; connect-src 'self' https://tile.openstreetmap.org; frame-ancestors 'self'; base-uri 'self'; form-action 'self';"
    
    # Permissions-Policy: Control browser features and APIs
    Header always set Permissions-Policy "geolocation=(self), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"
    
    # Strict-Transport-Security (HSTS): Enforce HTTPS connections
    # Only enable this if you have SSL/TLS configured
    # Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    
    # Remove X-Powered-By header (PHP version information)
    Header unset X-Powered-By
    
    # Remove Server header details
    Header unset Server
</IfModule>

# Disable HTTP TRACE method (prevents XST attacks)
TraceEnable Off

# Limit request body size to prevent DoS attacks (10MB)
LimitRequestBody 10485760

# Limit request fields to prevent header-based attacks
LimitRequestFields 100
LimitRequestFieldSize 8190
LimitRequestLine 8190

# Disable server signature in error pages
ServerSignature Off

# Hide Apache version information
ServerTokens Prod

# Disable ETag header (can leak inode information)
<IfModule mod_headers.c>
    Header unset ETag
</IfModule>
FileETag None

# Protect against protocol downgrade attacks
<IfModule mod_ssl.c>
    SSLProtocol -all +TLSv1.2 +TLSv1.3
    SSLCipherSuite HIGH:!aNULL:!MD5:!3DES
    SSLHonorCipherOrder on
</IfModule>

# Prevent access to sensitive directories
<DirectoryMatch "/(\.git|\.svn|\.hg|CVS|vendor|node_modules|storage|cache|temp|tmp)">
    Require all denied
</DirectoryMatch>

# Protect PHP files in uploads directory
<Directory /var/www/html/uploads>
    <FilesMatch "\.php$">
        Require all denied
    </FilesMatch>
</Directory>

# Set cookie security flags via PHP
<IfModule mod_php.c>
    php_flag session.cookie_httponly on
    php_flag session.cookie_secure on
    php_value session.cookie_samesite Strict
</IfModule>

# Prevent information disclosure in error messages
# This should be handled in php.ini, but adding here as backup
<IfModule mod_php.c>
    php_flag display_errors off
    php_flag display_startup_errors off
</IfModule>

