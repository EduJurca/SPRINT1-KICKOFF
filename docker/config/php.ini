; PHP Configuration for Carsharing Platform
; Production Environment
; Date: October 2025
; PHP Version: 8.2

[PHP]

;;;;;;;;;;;;;;;;;;;
; Error Handling  ;
;;;;;;;;;;;;;;;;;;;

; Display errors to browser (OFF in production)
display_errors = Off
display_startup_errors = Off

; Log errors to file
log_errors = On
error_log = /var/log/apache2/php_errors.log

; Error reporting level (log all errors but don't display)
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; HTML errors (OFF in production)
html_errors = Off

;;;;;;;;;;;;;;;;;;;
; Resource Limits ;
;;;;;;;;;;;;;;;;;;;

; Maximum execution time of each script, in seconds
max_execution_time = 60

; Maximum amount of time each script may spend parsing request data
max_input_time = 60

; Maximum amount of memory a script may consume
memory_limit = 256M

;;;;;;;;;;;;;;;;;;;
; File Uploads    ;
;;;;;;;;;;;;;;;;;;;

; Whether to allow HTTP file uploads
file_uploads = On

; Maximum allowed size for uploaded files
upload_max_filesize = 10M

; Maximum number of files that can be uploaded via a single request
max_file_uploads = 20

; Maximum size of POST data that PHP will accept
post_max_size = 10M

;;;;;;;;;;;;;;;;;;;
; Security        ;
;;;;;;;;;;;;;;;;;;;

; Expose PHP version in HTTP headers (OFF for security)
expose_php = Off

; Disable dangerous functions
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,curl_exec,curl_multi_exec,parse_ini_file,show_source

; Open basedir restriction (limit file operations to specific directories)
; open_basedir = /var/www/html:/tmp

; Disable allow_url_fopen for security (can be enabled if needed)
allow_url_fopen = On
allow_url_include = Off

;;;;;;;;;;;;;;;;;;;
; Session         ;
;;;;;;;;;;;;;;;;;;;

; Session save handler
session.save_handler = files
session.save_path = "/tmp"

; Use cookies to store session ID
session.use_cookies = 1
session.use_only_cookies = 1

; Name of the session cookie
session.name = CARSHARING_SESSID

; Cookie lifetime (0 = until browser closes)
session.cookie_lifetime = 0

; Cookie path
session.cookie_path = /

; Cookie domain
session.cookie_domain =

; Cookie security flags
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = Strict

; Session garbage collection
session.gc_probability = 1
session.gc_divisor = 1000
session.gc_maxlifetime = 7200

; Use strict session ID mode
session.use_strict_mode = 1

;;;;;;;;;;;;;;;;;;;
; Date/Time       ;
;;;;;;;;;;;;;;;;;;;

; Default timezone
date.timezone = UTC

;;;;;;;;;;;;;;;;;;;
; Output Control  ;
;;;;;;;;;;;;;;;;;;;

; Output buffering
output_buffering = 4096

; Implicit flush
implicit_flush = Off

;;;;;;;;;;;;;;;;;;;
; Character Set   ;
;;;;;;;;;;;;;;;;;;;

; Default charset
default_charset = "UTF-8"

;;;;;;;;;;;;;;;;;;;
; MySQL/MariaDB   ;
;;;;;;;;;;;;;;;;;;;

[mysqli]
mysqli.max_persistent = -1
mysqli.allow_persistent = On
mysqli.max_links = -1
mysqli.default_port = 3306
mysqli.default_socket =
mysqli.default_host =
mysqli.default_user =
mysqli.default_pw =
mysqli.reconnect = Off

[mysqlnd]
mysqlnd.collect_statistics = On
mysqlnd.collect_memory_statistics = Off

;;;;;;;;;;;;;;;;;;;
; PDO             ;
;;;;;;;;;;;;;;;;;;;

[PDO]
pdo_mysql.default_socket =

;;;;;;;;;;;;;;;;;;;
; MongoDB         ;
;;;;;;;;;;;;;;;;;;;

[mongodb]
; MongoDB extension is enabled via docker-php-ext-enable

;;;;;;;;;;;;;;;;;;;
; Mail            ;
;;;;;;;;;;;;;;;;;;;

[mail function]
SMTP = localhost
smtp_port = 25
sendmail_path = /usr/sbin/sendmail -t -i

;;;;;;;;;;;;;;;;;;;
; Opcache         ;
;;;;;;;;;;;;;;;;;;;

[opcache]
; Enable Opcache for better performance
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 2
opcache.fast_shutdown = 1

;;;;;;;;;;;;;;;;;;;
; Assertions      ;
;;;;;;;;;;;;;;;;;;;

[Assertion]
; Disable assertions in production
zend.assertions = -1
assert.active = 0

;;;;;;;;;;;;;;;;;;;
; Miscellaneous   ;
;;;;;;;;;;;;;;;;;;;

; Maximum size of input variables
max_input_vars = 1000

; Maximum nesting level of input variables
max_input_nesting_level = 64

; Ignore user abort
ignore_user_abort = Off

; Realpath cache
realpath_cache_size = 4096K
realpath_cache_ttl = 120

; Disable deprecated warnings
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

