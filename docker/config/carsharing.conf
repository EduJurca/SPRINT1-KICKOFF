# Apache Virtual Host Configuration
# Carsharing Platform
# Date: October 2025

<VirtualHost *:80>
    # Server configuration
    ServerName localhost
    ServerAdmin admin@carsharing.local
    
    # Document root points to public directory
    DocumentRoot /var/www/html/public
    
    # Main public directory configuration
    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks -MultiViews
        AllowOverride All
        Require all granted
        
        # Enable URL rewriting
        <IfModule mod_rewrite.c>
            RewriteEngine On
            
            # Redirect to HTTPS (uncomment when SSL is configured)
            # RewriteCond %{HTTPS} off
            # RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
            
            # Handle front controller pattern
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^ index.html [L]
        </IfModule>
        
        # Prevent access to hidden files
        <FilesMatch "^\.">
            Require all denied
        </FilesMatch>
    </Directory>
    
    # Prevent access to parent directories
    <Directory /var/www/html>
        Options -Indexes
        AllowOverride None
        Require all denied
    </Directory>
    
    # Allow access to public directory
    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    # API directory configuration
    Alias /api /var/www/html/api
    <Directory /var/www/html/api>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Ensure Authorization header is passed to PHP
        <IfModule mod_setenvif.c>
            SetEnvIf Authorization "(.*)" HTTP_AUTHORIZATION=$1
        </IfModule>
        
        # PHP configuration for API
        <IfModule mod_php.c>
            php_flag display_errors off
            php_value error_reporting 0
        </IfModule>
        
        # Enable URL rewriting for API endpoints
        <IfModule mod_rewrite.c>
            RewriteEngine On
            # Preserve Authorization header for apps that rely on it
            RewriteCond %{HTTP:Authorization} ^(.+)
            RewriteRule .* - [E=HTTP_AUTHORIZATION:%1]
            
            # Handle API routing
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^(.*)$ index.php [QSA,L]
        </IfModule>
        
        # Set proper content type for API responses
        <IfModule mod_headers.c>
            Header set Content-Type "application/json; charset=utf-8"
        </IfModule>
    </Directory>
    
    # JavaScript directory
    Alias /js /var/www/html/js
    <Directory /var/www/html/js>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        
        # Cache JavaScript files
        <IfModule mod_headers.c>
            Header set Cache-Control "public, max-age=31536000, immutable"
        </IfModule>
        
        # Set proper MIME type
        <IfModule mod_mime.c>
            AddType application/javascript .js
        </IfModule>
    </Directory>
    
    # CSS directory
    Alias /css /var/www/html/css
    <Directory /var/www/html/css>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        
        # Cache CSS files
        <IfModule mod_headers.c>
            Header set Cache-Control "public, max-age=31536000, immutable"
        </IfModule>
        
        # Set proper MIME type
        <IfModule mod_mime.c>
            AddType text/css .css
        </IfModule>
    </Directory>
    
    # Language files directory
    Alias /lang /var/www/html/lang
    <Directory /var/www/html/lang>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        
        # Set proper MIME type for JSON files
        <IfModule mod_mime.c>
            AddType application/json .json
        </IfModule>
        
        # Enable CORS for language files
        <IfModule mod_headers.c>
            Header set Access-Control-Allow-Origin "*"
        </IfModule>
    </Directory>
    
    # Prevent access to vendor directory
    <Directory /var/www/html/vendor>
        Require all denied
    </Directory>
    
    # Prevent access to database directory
    <Directory /var/www/html/database>
        Require all denied
    </Directory>
    
    # Logging configuration
    ErrorLog ${APACHE_LOG_DIR}/carsharing-error.log
    CustomLog ${APACHE_LOG_DIR}/carsharing-access.log combined
    
    # Log level for this virtual host
    LogLevel warn
    
    # Compression configuration
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript application/json
    </IfModule>
    
    # Browser caching for static assets
    <IfModule mod_expires.c>
        ExpiresActive On
        
        # Images
        ExpiresByType image/jpeg "access plus 1 year"
        ExpiresByType image/png "access plus 1 year"
        ExpiresByType image/gif "access plus 1 year"
        ExpiresByType image/svg+xml "access plus 1 year"
        ExpiresByType image/webp "access plus 1 year"
        
        # CSS and JavaScript
        ExpiresByType text/css "access plus 1 year"
        ExpiresByType application/javascript "access plus 1 year"
        
        # Fonts
        ExpiresByType font/woff "access plus 1 year"
        ExpiresByType font/woff2 "access plus 1 year"
        ExpiresByType application/font-woff "access plus 1 year"
        ExpiresByType application/font-woff2 "access plus 1 year"
        
        # HTML and JSON (shorter cache)
        ExpiresByType text/html "access plus 0 seconds"
        ExpiresByType application/json "access plus 0 seconds"
    </IfModule>
    
    # MIME types configuration
    <IfModule mod_mime.c>
        AddType application/javascript .js
        AddType text/css .css
        AddType application/json .json
        AddType image/svg+xml .svg
        AddType font/woff .woff
        AddType font/woff2 .woff2
    </IfModule>
    
</VirtualHost>

