<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="VoltiaCar Map - Find vehicles near you">
  <title>Vehicle Map - VoltiaCar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
crossorigin=""
>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <style>
    .keyboard-navigation *:focus {
      outline: 2px solid #3b82f6;
      outline-offset: 2px;
    }
    #map {
      height: calc(100vh - 64px);
      width: 100%;
    }
    .leaflet-popup-content-wrapper {
      border-radius: 0.5rem;
    }
  </style>
</head>
<body class="font-sans antialiased">
  <!-- Navigation -->
  <nav
class="bg-white shadow-lg sticky top-0 z-[1000]"
role="navigation"
aria-label="Main navigation"
>
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <a href="./index.html" class="flex items-center space-x-2">
            <svg
class="w-8 h-8 text-blue-600"
fill="currentColor"
viewBox="0 0 24 24"
aria-hidden="true"
>
              <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/>
            </svg>
            <span class="text-xl font-bold text-gray-900">VoltiaCar</span>
          </a>
        </div>

        <div class="flex items-center space-x-6">
          <a
href="./dashboard.html"
class="text-gray-700 hover:text-blue-600 transition-colors"
data-auth-required
data-i18n="nav.dashboard"
>Dashboard</a>
          <a
href="./map.html"
class="text-blue-600 font-semibold"
data-i18n="nav.map"
>Map</a>
          
          <!-- Language Switcher -->
          <div class="flex items-center space-x-2 border-l pl-4">
            <button
data-lang="es"
class="px-2 py-1 rounded hover:bg-gray-100 transition-colors"
aria-label="Español"
>ES</button>
            <button
data-lang="en"
class="px-2 py-1 rounded hover:bg-gray-100 transition-colors"
aria-label="English"
>EN</button>
          </div>

          <div class="flex items-center space-x-4">
            <a
href="./login.html"
class="text-gray-700 hover:text-blue-600 transition-colors"
data-guest-only
data-i18n="nav.login"
>Login</a>
            <a
href="./register.html"
class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors"
data-guest-only
data-i18n="nav.register"
>Register</a>
            
            <span
class="hidden text-gray-700"
data-auth-required
data-user-name
>User</span>
            <button
class="hidden text-gray-700 hover:text-blue-600 transition-colors"
data-auth-required
data-logout
data-i18n="nav.logout"
>Logout</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- Map Controls Overlay -->
  <div class="absolute top-20 left-4 z-[1000] bg-white rounded-lg shadow-lg p-4 max-w-xs">
    <h2 class="text-lg font-bold text-gray-900 mb-3" data-i18n="map.title">Vehicle Map</h2>
    <p class="text-sm text-gray-600 mb-4" data-i18n="map.subtitle">Find vehicles near you</p>
    
    <!-- Filter Buttons -->
    <div class="space-y-2">
      <p class="text-sm font-semibold text-gray-700 mb-2">Filter by:</p>
      <div class="flex flex-wrap gap-2">
        <button
data-filter="all"
class="px-3 py-1 rounded-lg text-sm font-medium bg-blue-600 text-white transition-colors"
data-i18n="map.filter_all"
>
          All
        </button>
        <button
data-filter="available"
class="px-3 py-1 rounded-lg text-sm font-medium bg-gray-200 text-gray-700 hover:bg-gray-300 transition-colors"
data-i18n="map.filter_available"
>
          Available
        </button>
        <button
data-filter="electric"
class="px-3 py-1 rounded-lg text-sm font-medium bg-gray-200 text-gray-700 hover:bg-gray-300 transition-colors"
data-i18n="map.filter_electric"
>
          Electric
        </button>
        <button
data-filter="hybrid"
class="px-3 py-1 rounded-lg text-sm font-medium bg-gray-200 text-gray-700 hover:bg-gray-300 transition-colors"
data-i18n="map.filter_hybrid"
>
          Hybrid
        </button>
      </div>
    </div>

    <!-- Legend -->
    <div class="mt-4 pt-4 border-t">
      <p class="text-sm font-semibold text-gray-700 mb-2">Legend:</p>
      <div class="space-y-2 text-sm">
        <div class="flex items-center">
          <div class="w-4 h-4 rounded-full bg-green-500 mr-2"></div>
          <span class="text-gray-700" data-i18n="map.available">Available</span>
        </div>
        <div class="flex items-center">
          <div class="w-4 h-4 rounded-full bg-red-500 mr-2"></div>
          <span class="text-gray-700" data-i18n="map.in_use">In Use</span>
        </div>
        <div class="flex items-center">
          <div class="w-4 h-4 rounded-full bg-orange-500 mr-2"></div>
          <span class="text-gray-700" data-i18n="map.maintenance">Maintenance</span>
        </div>
      </div>
    </div>

    <!-- Refresh Button -->
    <button onclick="if(window.vehicleMap) window.vehicleMap.refresh()" class="mt-4 w-full bg-gray-100 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-200 transition-colors flex items-center justify-center">
      <svg
class="w-4 h-4 mr-2"
fill="none"
stroke="currentColor"
viewBox="0 0 24 24"
aria-hidden="true"
>
        <path
stroke-linecap="round"
stroke-linejoin="round"
stroke-width="2"
d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
/>
      </svg>
      Refresh
    </button>
  </div>

  <!-- Map Container -->
  <div
id="map"
role="application"
aria-label="Interactive map showing vehicle locations"
></div>

  <!-- Scripts -->
  <script src="../js/i18n.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/validation.js"></script>
  <script src="../js/map.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
